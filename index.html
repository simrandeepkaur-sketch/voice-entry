<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voice Ledger Entry</title>
</head>
<body>

<h1>Voice Ledger Entry</h1>

<textarea id="text" rows="5" cols="35"></textarea><br><br>

<button onclick="startVoice()">🎤 Speak</button>
<button onclick="sendEntry()">Submit</button>

<p id="status"></p>

<script>
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-IN';
  recognition.onresult = function(event) {
    document.getElementById('text').value = event.results[0][0].transcript;
  };
  recognition.start();
}

async function sendEntry() {
  const message = document.getElementById('text').value;
  document.getElementById('status').innerText = 'Sending...';

  try {
    const response = await fetch('https://prabhaasra.app.n8n.cloud/webhook/master-entry', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: message })
    });

    if (response.ok) {
      document.getElementById('status').innerText = 'Entry sent successfully';
      document.getElementById('text').value = '';
    } else {
      document.getElementById('status').innerText = 'Error: ' + response.status;
    }
  } catch (error) {
    document.getElementById('status').innerText = 'Failed: ' + error.message;
  }
}
</script>

</body>
</html>
